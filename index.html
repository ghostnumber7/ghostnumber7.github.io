<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>untitled.cl</title>

<style>
  :root{
    --bg: #070b07;
    --panel: rgba(10, 16, 10, 0.85);
    --fg: #34ff66;
    --muted: rgba(52,255,102,0.45);
    --dim: rgba(52,255,102,0.25);
    --border: rgba(52,255,102,0.18);
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; }

  body{
    margin: 0;
    height: 100vh;       /* lock to viewport */
    overflow: hidden;    /* no accidental scrollbars */
    background: radial-gradient(1200px 800px at 50% 55%, #0b140c 0%, var(--bg) 55%, #050705 100%);
    color: var(--fg);
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    font-size: 15px;
    line-height: 1.55;
  }

  .page{
    height: 100%;
    display: grid;
    place-items: center;
    padding: 28px;
  }

  .terminal{
    width: min(760px, 100%);
    background: linear-gradient(180deg, rgba(8,12,8,0.92), rgba(6,10,6,0.85));
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow:
      0 20px 60px rgba(0,0,0,0.55),
      0 0 0 1px rgba(255,255,255,0.03) inset;
    padding: 18px 18px 16px;
    position: relative;
  }

  /* subtle “scanline” vibe, very light */
  .terminal::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:14px;
    pointer-events:none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(52,255,102,0.035),
      rgba(52,255,102,0.035) 1px,
      rgba(0,0,0,0) 3px,
      rgba(0,0,0,0) 6px
    );
    mix-blend-mode: overlay;
    opacity: 0.35;
  }

  .bar{
    display:flex;
    align-items:center;
    gap:8px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(52,255,102,0.10);
    margin-bottom: 14px;
  }
  .dot{ width:10px; height:10px; border-radius:50%; background: rgba(52,255,102,0.18); }
  .title{
    margin-left: 8px;
    color: var(--dim);
    font-size: 12px;
    letter-spacing: 0.02em;
  }

  .terminal > div { margin: 6px 0; white-space: pre-wrap; }
  .prompt{ color: var(--muted); }
  .cmd{ color: var(--fg); font-weight: 600; }

  a{
    color: var(--fg);
    text-decoration: none;
    border-bottom: 1px solid rgba(52,255,102,0.22);
  }
  a:hover{
    border-bottom-color: rgba(52,255,102,0.7);
  }

  /* optional blinking cursor */
  .cursor{
    display:inline-block;
    width: 9px;
    height: 16px;
    background: rgba(52,255,102,0.6);
    vertical-align: -3px;
    margin-left: 6px;
    animation: blink 1.1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>

<body>
  <div class="page">
    <div class="terminal" role="region" aria-label="terminal">
      <div class="bar">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        <span class="title">marco@untitled:~</span>
      </div>

      <div><span class="prompt">marco@untitled:~$</span> <span class="cmd">cat README</span></div>
      <div>untitled.cl</div>
      <div></div>
      <div>This domain intentionally contains very little.</div>
      <div>It is primarily used for infrastructure experiments and email.</div>
      <div></div>
      <div>Sometimes I build things.</div>
      <div></div>
      <div><span class="prompt">marco@untitled:~$</span> <a href="https://github.com/ghostnumber7" target="_blank" rel="noreferrer">open github.com/ghostnumber7</a><span class="cursor" aria-hidden="true"></span></div>
    </div>
  </div>
</body>
</html>
